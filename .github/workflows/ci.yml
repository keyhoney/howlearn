name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: https://www.howlearn.kr
      PUBLIC_MATH_SITE_URL: https://math.howlearn.kr
      PUBLIC_CONTACT_EMAIL: contact@howlearn.kr
      PUBLIC_ADSENSE_PUBLISHER_ID: pub-0000000000000000
      FORMSPREE_FORM_ID: ci-placeholder
      CF_PAGES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content index
        run: npm run content:validate

      - name: Validate redirects
        run: npm run redirects:validate

      - name: Validate content body length
        run: npm run content:validate-body

      - name: Run unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npm run test:e2e
